spring:
  application:
    name: kotlin-skeleton
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/app}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:dev}
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info

logging:
  pattern:
    # TraceIdFilter가 MDC에 심은 traceId를 모든 로그 라인 앞에 노출
    # 결과 예: 2026-04-20 17:00:00.000 INFO  [app,7a8b9c0d1e2f3a4b] ...
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"
